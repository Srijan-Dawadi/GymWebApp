{% extends 'base.html' %}
{% block title %}Edit Plan — GymApp{% endblock %}
{% block page_title %}Edit Plan: {{ plan.name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto glass-card rounded-2xl p-6">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:var(--text3)">{{ field.label }}</label>
      <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
        value="{{ field.value|default:'' }}"
        class="w-full glow-input" />
      {% if field.errors %}<p class="text-xs mt-1" style="color:#ef4444">{{ field.errors|join:", " }}</p>{% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="action-btn flex-1 py-2.5 text-white font-semibold rounded-xl text-sm"
        style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 15px rgba(99,102,241,0.3)">
        Save Changes
      </button>
      <a href="/billing/plans/" class="action-btn cancel-btn px-5 py-2.5 rounded-xl text-sm font-medium text-center">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
