{% extends 'base.html' %}
{% block title %}Edit Plan — GymApp{% endblock %}
{% block page_title %}Edit Plan: {{ plan.name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
      <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
        value="{{ field.value|default:'' }}"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
      {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors|join:", " }}</p>{% endif %}
    </div>
    {% endfor %}
    <div class="flex gap-3">
      <button type="submit" class="flex-1 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition-colors">Save</button>
      <a href="/billing/plans/" class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
