<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GymApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; left: -150px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -6s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid pattern overlay */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .login-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      animation: cardEnter 0.6s cubic-bezier(.4,0,.2,1);
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: rgba(255,255,255,0.25); }
    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
      outline: none;
    }

    .btn-login {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.5);
    }
    .btn-login:active { transform: translateY(0); }

    .logo-ring {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      animation: logoSpin 3s linear infinite;
      box-shadow: 0 0 30px rgba(99,102,241,0.5);
    }
    @keyframes logoSpin {
      0%, 100% { box-shadow: 0 0 20px rgba(99,102,241,0.5); }
      50% { box-shadow: 0 0 40px rgba(139,92,246,0.7); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-bg"></div>

  <div class="relative z-10 w-full max-w-md px-4">
    <div class="login-card rounded-2xl p-8">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 logo-ring rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">💪</div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Welcome back</h1>
        <p class="text-gray-500 text-sm mt-1">Sign in to GymApp</p>
      </div>

      <form method="post" class="space-y-5">
        {% csrf_token %}

        {% if form.non_field_errors %}
        <div class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          {{ form.non_field_errors }}
        </div>
        {% endif %}

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Username</label>
          <input type="text" name="username" value="{{ form.username.value|default:'' }}"
            class="input-field w-full px-4 py-3 rounded-xl text-sm"
            placeholder="Enter your username" autofocus />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
          <input type="password" name="password"
            class="input-field w-full px-4 py-3 rounded-xl text-sm"
            placeholder="Enter your password" />
        </div>

        <button type="submit" class="btn-login w-full py-3 text-white font-semibold rounded-xl text-sm">
          Sign In →
        </button>
      </form>

      <p class="text-center text-gray-600 text-xs mt-6">GymApp Management System</p>
    </div>
  </div>
</body>
</html>
