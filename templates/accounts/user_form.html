{% extends 'base.html' %}
{% block title %}{{ action }} User — GymApp{% endblock %}
{% block page_title %}{{ action }} User{% endblock %}

{% block content %}
<div class="max-w-md bg-white rounded-xl shadow-sm border border-gray-100 p-6">
  <form method="post" class="space-y-4">
    {% csrf_token %}

    {% if action == 'Create' %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input type="text" name="username" required
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
    </div>
    {% else %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
      <input type="text" value="{{ u.username }}" disabled
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 text-gray-500" />
    </div>
    {% endif %}

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" value="{% if u %}{{ u.email }}{% endif %}"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Password {% if action == 'Edit' %}<span class="text-gray-400 font-normal">(leave blank to keep current)</span>{% endif %}
      </label>
      <input type="password" name="password" {% if action == 'Create' %}required{% endif %}
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
      <select name="role" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        <option value="staff" {% if u and u.profile.role == 'staff' %}selected{% endif %}>Staff</option>
        <option value="admin" {% if u and u.profile.role == 'admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
        {{ action }} User
      </button>
      <a href="/accounts/users/" class="px-4 py-2 border border-gray-300 text-sm rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
