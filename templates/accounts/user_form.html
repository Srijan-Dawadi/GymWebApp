{% extends 'base.html' %}
{% block title %}{{ action }} User — GymApp{% endblock %}
{% block page_title %}{{ action }} User{% endblock %}

{% block content %}
<div class="max-w-md glass-card rounded-2xl p-6">
  <form method="post" class="space-y-4">
    {% csrf_token %}

    {% if action == 'Create' %}
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:var(--text3)">Username</label>
      <input type="text" name="username" required class="w-full glow-input" />
    </div>
    {% else %}
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:var(--text3)">Username</label>
      <input type="text" value="{{ u.username }}" disabled
        class="w-full glow-input opacity-50 cursor-not-allowed" />
    </div>
    {% endif %}

    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:var(--text3)">Email</label>
      <input type="email" name="email" value="{% if u %}{{ u.email }}{% endif %}"
        class="w-full glow-input" />
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:var(--text3)">
        Password
        {% if action == 'Edit' %}<span class="font-normal normal-case ml-1" style="color:var(--text3)">— leave blank to keep current</span>{% endif %}
      </label>
      <input type="password" name="password" {% if action == 'Create' %}required{% endif %}
        class="w-full glow-input" />
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider mb-1.5" style="color:var(--text3)">Role</label>
      <select name="role" class="w-full glow-input">
        <option value="staff" {% if u and u.profile.role == 'staff' %}selected{% endif %}>Staff</option>
        <option value="admin" {% if u and u.profile.role == 'admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="action-btn px-5 py-2.5 text-white font-semibold rounded-xl text-sm"
        style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 4px 15px rgba(99,102,241,0.3)">
        {{ action }} User
      </button>
      <a href="/accounts/users/" class="action-btn cancel-btn px-5 py-2.5 rounded-xl text-sm font-medium text-center">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
